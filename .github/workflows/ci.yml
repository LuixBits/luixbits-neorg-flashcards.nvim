name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install tools on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

          archive="$RUNNER_TEMP/nvim-linux-x86_64.tar.gz"
          curl -L https://github.com/neovim/neovim/releases/download/v0.12.4/nvim-linux-x86_64.tar.gz -o "$archive"
          echo "012bf3fcac5ade43914df3f174668bf64d05e049a4f032a388c027b1ebd78628  $archive" | sha256sum -c -
          tar -xzf "$archive" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Install tools on macOS
        if: runner.os == 'macOS'
        run: brew install lua neovim

      - name: Headless Neovim tests
        run: |
          nvim --version | sed -n '1,3p'
          bash scripts/test.sh

      - name: Clean config install check
        run: bash scripts/check-clean-install.sh

  minimum-neovim:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Lua compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Install Neovim 0.10.4
        run: |
          archive="$RUNNER_TEMP/nvim-linux-x86_64.tar.gz"
          curl -L https://github.com/neovim/neovim/releases/download/v0.10.4/nvim-linux-x86_64.tar.gz -o "$archive"
          echo "95aaa8e89473f5421114f2787c13ae0ec6e11ebbd1a13a1bd6fcf63420f8073f  $archive" | sha256sum -c -
          tar -xzf "$archive" -C "$RUNNER_TEMP"

      - name: Compatibility tests
        env:
          NVIM: ${{ runner.temp }}/nvim-linux-x86_64/bin/nvim
        run: |
          "$NVIM" --version | sed -n '1,3p'
          bash scripts/test.sh
          bash scripts/check-clean-install.sh

  nix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Flake checks
        run: nix flake check --print-build-logs

  video:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: video/package-lock.json

      - name: Install video dependencies
        run: npm ci --prefix video

      - name: Type-check the composition
        run: npm run check --prefix video

      - name: Inspect the composition
        run: npm run compositions --prefix video

      - name: Render the poster frame
        run: npm run still --prefix video
